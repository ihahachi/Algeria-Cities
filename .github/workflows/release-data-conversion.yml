name: Release Data Conversion

on:
  release:
    types: [created]

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------
      # 1. Checkout repository
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # 2. Install GDAL (GeoJSON → SHP)
      # ---------------------------
      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin zip

      # ---------------------------
      # 3. Setup Python (CSV → XLSX)
      # ---------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pandas openpyxl

      # ---------------------------
      # 4. Prepare output folders
      # ---------------------------
      - name: Create output directories
        run: |
          mkdir -p output/shapefiles
          mkdir -p output/excel

      # ---------------------------
      # 5. Convert GeoJSON → Shapefile (UTF-8 + zipped)
      # ---------------------------
      - name: Convert GeoJSON to Shapefile
        run: |
          shopt -s nullglob

          for file in geojson/*.geojson; do
            filename=$(basename "$file" .geojson)

            echo "Processing $file..."

            ogr2ogr \
              -f "ESRI Shapefile" \
              "output/shapefiles/$filename.shp" \
              "$file" \
              -t_srs EPSG:4326 \
              -lco ENCODING=UTF-8 \
              -skipfailures

            # Zip all related shapefile components
            cd output/shapefiles
            zip -q "$filename.zip" "$filename".*
            cd - > /dev/null
          done

      # ---------------------------
      # 6. Convert CSV → Excel (UTF-8 safe)
      # ---------------------------
      - name: Convert CSV to Excel
        run: |
          python <<EOF
import pandas as pd
import glob
import os

files = glob.glob("csv/*.csv")

for file in files:
    filename = os.path.splitext(os.path.basename(file))[0]
    print(f"Processing {file}...")

    try:
        df = pd.read_csv(file, encoding="utf-8", sep=None, engine="python", low_memory=False)
    except Exception:
        # fallback for problematic encodings
        df = pd.read_csv(file, encoding="latin1", sep=None, engine="python", low_memory=False)

    output_path = f"output/excel/{filename}.xlsx"

    with pd.ExcelWriter(output_path, engine="openpyxl") as writer:
        df.to_excel(writer, sheet_name="data", index=False)

print("CSV → Excel conversion completed")
EOF

      # ---------------------------
      # 7. Upload artifacts (optional but useful)
      # ---------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: converted-files
          path: output/

      # ---------------------------
      # 8. Attach files to GitHub Release
      # ---------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/shapefiles/*.zip
            output/excel/*.xlsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
